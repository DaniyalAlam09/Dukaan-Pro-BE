services:
  - type: web
    name: dukaan-pro-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    autoDeploy: true
    envVars:
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "localhost,127.0.0.1,dukaan-pro.vercel.app"
      - key: CORS_ALLOWED_ORIGINS
        value: "http://localhost:5173,https://dukaan-pro.vercel.app"
